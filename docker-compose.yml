version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resonance-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # 前端开发请使用 HBuilderX 或 CLI 本地运行
  # 生产部署时通过 nginx 代理小程序后端接口
